# LGU PRIME-HRM — Apache config for apps.cebu.gov.ph/llcprime
# ---------------------------------------------------------------------------
# This box runs Apache 2.4 (same setup as the ACCESS project). Unlike ACCESS
# (a PHP app served directly), PRIME-HRM is a React SPA + a Node backend, so we
# need mod_proxy for the API plus an Alias for the built static files.
#
# ProxyPass is NOT allowed in .htaccess, so this lives in a conf file:
#   sudo cp deploy/apache-llcprime.conf /etc/apache2/conf-available/llcprime.conf
#   sudo a2enmod proxy proxy_http rewrite
#   sudo a2enconf llcprime
#   sudo apache2ctl configtest        # MUST say "Syntax OK" before reloading
#   sudo systemctl reload apache2
#
# ADDITIVE: it defines only the /llcprime URL space. It does not touch the
# other apps' config or the apps.cebu.gov.ph vhost. `configtest` fails safe.
# ---------------------------------------------------------------------------

# --- API + uploads → Node backend on 127.0.0.1:5010 ---
# Apache appends the un-matched remainder, so /llcprime/api/auth/login proxies
# to http://127.0.0.1:5010/api/auth/login — the backend sees /api/... unchanged.
ProxyPreserveHost On
ProxyPass        /llcprime/api      http://127.0.0.1:5010/api      retry=0
ProxyPassReverse /llcprime/api      http://127.0.0.1:5010/api
ProxyPass        /llcprime/uploads  http://127.0.0.1:5010/uploads  retry=0
ProxyPassReverse /llcprime/uploads  http://127.0.0.1:5010/uploads

# --- Frontend static (Vite dist) + SPA fallback ---
Alias /llcprime /var/www/html/llcprime/client/dist
<Directory /var/www/html/llcprime/client/dist>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    # Client-side routing: any path that isn't a real file/dir → index.html.
    # Kept in the conf (not a .htaccess in dist/) so a Vite rebuild can't wipe it.
    RewriteEngine On
    RewriteBase /llcprime
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /llcprime/index.html [L]
</Directory>

# Bare /llcprime → /llcprime/
RedirectMatch 301 ^/llcprime$ /llcprime/
