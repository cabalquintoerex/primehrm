# LGU PRIME-HRM — Apache vhost for eprime.sytes.net (dedicated subdomain, served at ROOT)
# ---------------------------------------------------------------------------
# Unlike the old 0.15 sub-path setup, this is a NAME-BASED vhost: the whole
# subdomain is ours, served from the built frontend at DocumentRoot, with the
# Node API proxied at /api and /uploads. Other projects on the box live on
# their own vhosts/paths and are untouched (isolation is by hostname now).
#
# Install (HTTP first, then let certbot add HTTPS):
#   sudo a2enmod proxy proxy_http rewrite
#   sudo cp deploy/apache-eprime.conf /etc/apache2/sites-available/eprime.conf
#   sudo a2ensite eprime
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d eprime.sytes.net
#     ^ issues the cert and AUTO-GENERATES eprime-le-ssl.conf (:443) plus the
#       HTTP->HTTPS redirect — same as prime-le-ssl.conf on 0.15. Requires the
#       DNS (eprime.sytes.net) to already resolve to this server and port 80 open.
# ---------------------------------------------------------------------------
<VirtualHost *:80>
    ServerName eprime.sytes.net
    DocumentRoot /var/www/html/eprime/client/dist

    # API + uploads → Node backend on 127.0.0.1:5010 (served at the subdomain root)
    ProxyPreserveHost On
    ProxyPass        /api      http://127.0.0.1:5010/api      retry=0
    ProxyPassReverse /api      http://127.0.0.1:5010/api
    ProxyPass        /uploads  http://127.0.0.1:5010/uploads  retry=0
    ProxyPassReverse /uploads  http://127.0.0.1:5010/uploads

    # Frontend static (Vite dist) + SPA fallback — any non-file path → index.html
    <Directory /var/www/html/eprime/client/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/eprime_error.log
    CustomLog ${APACHE_LOG_DIR}/eprime_access.log combined
</VirtualHost>
