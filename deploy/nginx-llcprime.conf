# LGU PRIME-HRM — nginx location blocks for apps.cebu.gov.ph/llcprime
# ---------------------------------------------------------------------------
# ADDITIVE: paste these three location blocks INSIDE the existing
#   server { server_name apps.cebu.gov.ph; ... }
# block for the site. Do NOT create a new server{} — that would clash with the
# other apps on this host. Change nothing else in the file.
#
# After editing, ALWAYS:  sudo nginx -t   &&   sudo systemctl reload nginx
# `nginx -t` fails safe — if it errors, the running config (and the other apps)
# is untouched.
# ---------------------------------------------------------------------------

# Allow the 5 MB document/logo uploads (default is 1 MB). If a server-wide
# client_max_body_size is already set higher, this per-location one is harmless.
# Place inside the server{} block, or keep it scoped to the API location below.

# --- API: proxied to the Node backend on port 5010 ---
# Trailing slashes on BOTH sides strip the /llcprime/api prefix, so the backend
# still sees /api/... exactly as in development.
location /llcprime/api/ {
    proxy_pass         http://127.0.0.1:5010/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    client_max_body_size 10M;
}

# --- Uploaded files (logos, header images, applicant documents) ---
location /llcprime/uploads/ {
    proxy_pass       http://127.0.0.1:5010/uploads/;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Frontend static build (Vite dist) with SPA fallback ---
# The trailing-slash location + trailing-slash alias is the reliable combo for
# serving a SPA from a sub-path. try_files falls back to the app's index.html so
# client-side routes (e.g. /llcprime/rsp/dashboard) resolve on a hard refresh.
location /llcprime/ {
    alias     /var/www/llcprime/client/dist/;
    try_files $uri $uri/ /llcprime/index.html;
}

# Optional: bare /llcprime (no trailing slash) → redirect to /llcprime/
location = /llcprime {
    return 301 /llcprime/;
}
